name: Fleet Stats UI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "fleet-stats-ui/frontend/**"
      - "fleet-stats-ui/backend/**"
      - "fleet-stats-ui/run"
      - ".github/workflows/fleet-stats-ui.yml"

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fleet-stats-ui/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm run build

  backend-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fleet-stats-ui/backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run unit tests
        run: uv run pytest tests/unit_tests/ -v --cov=cs_backend --cov-report=term-missing

  backend-functional-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fleet-stats-ui/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: astral-sh/setup-uv@v4

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        working-directory: fleet-stats-ui/frontend
        run: pnpm install

      - name: Build frontend bundle
        working-directory: fleet-stats-ui/frontend
        run: pnpm run build

      - name: Install backend dependencies
        run: uv sync --all-extras

      - name: Start server
        run: |
          uv run uvicorn cs_backend.main:create_app --factory --host 0.0.0.0 --port 3000 &
          echo "Waiting for server to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            sleep 1
          done

      - name: Run functional tests
        env:
          CS_BACKEND_BASE_URL: http://localhost:3000
        run: uv run pytest tests/functional_tests/ -v
