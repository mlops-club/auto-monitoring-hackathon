# ADOT Lambda Collector configuration
# Receives telemetry from the Python OTel SDK on localhost and
# exports it to the Grafana stack OTLP endpoint on EKS.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: localhost:4317
      http:
        endpoint: localhost:4318

exporters:
  otlphttp:
    endpoint: "https://otlp.hack.subq-sandbox.com"
    compression: gzip

  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [otlphttp, debug]
    metrics:
      receivers: [otlp]
      exporters: [otlphttp, debug]
    logs:
      receivers: [otlp]
      exporters: [otlphttp, debug]
