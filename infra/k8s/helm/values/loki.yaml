# Loki - Log aggregation backend
# Chart: grafana/loki in SingleBinary mode
# S3_BUCKET and AWS_REGION are substituted by deploy-monitoring.sh via envsubst

fullnameOverride: loki

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: s3
    s3:
      region: ${AWS_REGION}
      s3ForcePathStyle: false
    bucketNames:
      chunks: ${S3_BUCKET}
      ruler: ${S3_BUCKET}
  limits_config:
    retention_period: 168h
    max_query_parallelism: 2
  compactor:
    retention_enabled: true

singleBinary:
  replicas: 1
  resources:
    requests:
      memory: 128Mi
    limits:
      memory: 384Mi
  persistence:
    enabled: true
    size: 10Gi

# Use IRSA service account created by CDK
serviceAccount:
  create: false
  name: loki

# Disable distributed components
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Disable sub-charts and caches
gateway:
  enabled: false
minio:
  enabled: false
chunksCache:
  enabled: false
resultsCache:
  enabled: false
